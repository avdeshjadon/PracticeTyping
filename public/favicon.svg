<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Keyboard body -->
  <rect x="4" y="16" width="56" height="36" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="2"/>
  <!-- Row 1 keys -->
  <rect x="10" y="22" width="8" height="7" rx="1.5" fill="#2a2a3e" stroke="#555" stroke-width="0.7"/>
  <rect x="20" y="22" width="8" height="7" rx="1.5" fill="#2a2a3e" stroke="#555" stroke-width="0.7"/>
  <rect x="30" y="22" width="8" height="7" rx="1.5" fill="#2a2a3e" stroke="#555" stroke-width="0.7"/>
  <rect x="40" y="22" width="8" height="7" rx="1.5" fill="#2a2a3e" stroke="#555" stroke-width="0.7"/>
  <!-- Row 2 keys (home row - highlighted) -->
  <rect x="12" y="31" width="8" height="7" rx="1.5" fill="#1a2e1a" stroke="#4ade80" stroke-width="1"/>
  <rect x="22" y="31" width="8" height="7" rx="1.5" fill="#1a2e1a" stroke="#4ade80" stroke-width="1"/>
  <rect x="32" y="31" width="8" height="7" rx="1.5" fill="#1a2e1a" stroke="#4ade80" stroke-width="1"/>
  <rect x="42" y="31" width="8" height="7" rx="1.5" fill="#1a2e1a" stroke="#4ade80" stroke-width="1"/>
  <!-- Spacebar -->
  <rect x="16" y="40" width="30" height="6" rx="2" fill="#2a2a3e" stroke="#555" stroke-width="0.7"/>
  <!-- Cursor blink -->
  <rect x="50" y="22" width="2" height="7" rx="1" fill="#facc15">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
